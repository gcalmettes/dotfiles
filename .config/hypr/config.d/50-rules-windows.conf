##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule
# windowrule = float on, match:class ^(kitty)$, match:title ^(kitty)$

# Ignore maximize requests from apps. You'll probably like this.
windowrule = suppress_event maximize, match:class .*

# Fix some dragging issues with XWayland
windowrule = no_initial_focus on, match:class ^$,match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0

# Thunar window float by default
windowrule = float on, match:class ^(thunar)$
windowrule = size 70% 65%, match:class ^(thunar)$
windowrule = center on, match:class ^(thunar)$

windowrule = float on, match:class ^(xdg-desktop-portal-gtk)$
windowrule = size 70% 65%, match:class ^(xdg-desktop-portal-gtk)$
windowrule = center on, match:class ^(xdg-desktop-portal-gtk)$

# Dbeaver
windowrule = float on, match:class ^(DBeaver)$
windowrule = size 80% 65%, match:class ^(DBeaver)$
windowrule = center on, match:class ^(DBeaver)$



# Blueman manager window float by default
windowrule = float on, match:class ^(blueman-manager)$
windowrule = size 50% 55%, match:class ^(blueman-manager)$
windowrule = center on, match:class ^(blueman-manager)$

# Pavucontrol window float by default
windowrule = float on, match:class ^(org.pulseaudio.pavucontrol)$
windowrule = size 60% 55%, match:class ^(org.pulseaudio.pavucontrol)$
windowrule = center on, match:class ^(org.pulseaudio.pavucontrol)$
